<!DOCTYPE html>

<html>
<head>
    <title>Edit Student</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
```

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">
                <h3>✏️ Edit Student</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Roll Number
                        </label>

                        <input
                            type="text"
                            name="roll"
                            value="{{ student[0] }}"
                            class="form-control"
                            readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Student Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            value="{{ student[1] }}"
                            class="form-control"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Marks
                        </label>

                        <input
                            type="number"
                            name="marks"
                            value="{{ student[2] }}"
                            class="form-control"
                            required>
                    </div>

                    <div class="d-grid gap-2">

                        <button type="submit"
                                class="btn btn-success">
                            Update Student
                        </button>

                        <a href="/students"
                           class="btn btn-secondary">
                            Back to Students
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

</body>
</html>
